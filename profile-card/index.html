<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <article class="profile-card">
        <img
          src="./portrait.webp"
          alt="Portrait of Grace Akpan"
          class="profile-card__image"
        />
        <h1 class="profile-card__name">Grace Akpan</h1>
        <p class="profile-card__role">Frontend Developer</p>
        <p class="profile-card__bio">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quibusdam
          quam nobis aliquam eaque blanditiis delectus voluptatum ipsam nostrum
          enim ipsa, voluptatem nesciunt quis reprehenderit, fugit quaerat
          magnam, rerum voluptatibus maxime.
        </p>
        <a class="profile-card__link" href="#">My Portfolio</a>
      </article>
    </main>
  </body>
</html>
